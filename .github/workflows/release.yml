name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). If empty, builds without publishing."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer + portable
        run: npm run package:release -- --publish never

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem -Path dist -File | Select-Object Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: standupscribe-windows
          path: |
            src/dist/*.exe
            src/dist/*.blockmap
            src/dist/latest*.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            src/dist/*.exe
            src/dist/*.blockmap
            src/dist/latest*.yml
